<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Adii Website</title>

    <style>
        body {
            background-color: #f0f8ff;
            text-align: center;
            font-family: Arial;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 {
            color: red;
            text-shadow: 2px 2px 5px pink;
        }

        img {
            width: 250px;
            border-radius: 15px;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.1);
        }

        button {
            background-color: blue;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0px 0px 10px blue;
        }

        button:hover {
            background-color: darkblue;
            transform: scale(1.1);
        }

        a {
            color: purple;
            text-decoration: none;
            font-weight: bold;
        }
    </style>

</head>
<body>

    <h1>Adii 💗</h1>

    <p>The coder 😎</p>

    <img src="photo.jpg" alt="my photo">

    <br><br>

    <a href="https://www.instagram.com/rajput_adii_life1" target="_blank">
        Follow me on Instagram 📸
    </a>

    <br><br>

    <button onclick="alert('Welcome Adii 😍')">Click me 😄</button>

</body>
</html>
